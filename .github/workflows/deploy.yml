name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: node scripts/generate.js --all

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: Qujmrzw8MsQrBA70pv7I-U6St2nbHFP8CICocZ36
          accountId: a81f15cc0a7a6b1ae22001312ce5f20c
          projectName: litong
          directory: output
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
